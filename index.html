    <!-- Prevent flash of wrong theme on load -->
    <script>
      (function () {
        try {
          var s = JSON.parse(localStorage.getItem('formidabile_settings_v1') || '{}')
          if (s.theme === 'dark') document.documentElement.setAttribute('data-theme', 'dark')
        } catch (e) {}
      })()
    </script>
