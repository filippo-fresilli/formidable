<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#1E7FFF" />
    <meta name="description" content="Il gioco delle forme e dei colori" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Formidable" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />
    <title>Formidable</title>
    <!-- Umami analytics (privacy-first, no cookies, no GDPR banner needed) -->
    <script defer src="https://cloud.umami.is/script.js" data-website-id="177ab67b-c7c9-4eca-9bb5-94d8bc22bfbc"></script>
    <!-- Prevent flash of wrong theme on load -->
    <script>
      (function () {
        try {
          var s = JSON.parse(localStorage.getItem('formidabile_settings_v1') || '{}')
          if (s.theme === 'dark') document.documentElement.setAttribute('data-theme', 'dark')
        } catch (e) {}
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
